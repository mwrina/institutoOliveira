
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/sidebar.css">
    <link rel="stylesheet" href="style/criarProj.css">
    <link rel="icon" type="image/x-icon" href="/imgs/icons/logo.png">
    <title>Instituto Oliveira - Administração</title>
</head>
<body>

    <!-- SIDEBAR -->

    <aside class="sidebar-container">

        <div class="sidebarLogo">
            <img src="imgs/icons/logo.png" id="logo">
            <img src="imgs/icons/logoTxtVerde.png" id="logoTxt">
        </div>
        
        <div class="sidebarContent">

            <button class="collapsible">
                Usuários cadastrados
            </button>
            <div class="content">
                <a href="admUsu.html">Usuários existentes</a> <br>
                <a href="criarUsu.html">Criar novo usuário</a>
            </div>

            <button class="collapsible">
                Alterar projetos
            </button>
            <div class="content">
                <a href="admProj.html">Projetos existentes</a> <br>
                <a href="criarProj.html">Criar projeto</a>
            </div>
            
            <button class="collapsible">
                Alterar contato
            </button>
            <div class="content">
                <a href="admContato.html">Contatos existentes</a> <br>
                <a href="criarContato.html">Criar novo contato</a>
            </div>
            
            <button class="collapsible">
                Blog
            </button>
            <div class="content">
                <a href="admBlog.html">Postagens existentes</a>
                <a href="criarBlog.html">Criar nova postagem</a>
            </div>

        </div>

        <div class="logout-container">
            <button id="logout">Voltar ao site</button>
        </div>

        <div class="usuLogado">
            <img src="imgs/icons/usuLogadoIcon.png" id="usuLogadoIcon">
            <p id="usuLogadoTxt">Usuário logado: </p>
        </div>
    </aside>
        
    <main>

        <div class="container">

            <h1 id="containerTit">Cadastro de Projeto</h1>

            <form class="cadastroUsu">
                
                <div class="lin1">
                    <label for="nome">Nome do projeto:</label> <br>
                    <input type="text" id="nome" placeholder="Digite o nome do projeto...">
                </div>

                <div class="lin2">
                    <label for="desc">Descrição do projeto:</label> <br>
                    <input type="text" id="desc" placeholder="Digite a descrição do projeto...">
                </div>

                <div class="btn">
                    <input type="submit" id="confirmBtn" value="Confirmar cadastro">
                </div>
                
            </form>

        </div>
    </main>

    <script src="js/sidebar.js"></script>

</body>
