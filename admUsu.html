
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/sidebar.css">
    <link rel="stylesheet" href="style/admUsu.css">
    <link rel="icon" type="image/x-icon" href="/imgs/icons/logo.png">
    <title>Instituto Oliveira - Administração</title>
</head>
<body>

    <!-- SIDEBAR -->

    <aside class="sidebar-container">

        <div class="sidebarLogo">
            <img src="imgs/icons/logo.png" id="logo">
            <img src="imgs/icons/logoTxtVerde.png" id="logoTxt">
        </div>
        
        <div class="sidebarContent">

            <button class="collapsible">
                Usuários cadastrados
            </button>
            <div class="content">
                <a href="admUsu.html">Usuários existentes</a> <br>
                <a>Criar novo usuário</a>
            </div>

            <button class="collapsible">
                Alterar projetos
            </button>
            <div class="content">
                <a>Projetos existentes</a>
                <a>Criar projeto</a>
            </div>
            
            <button class="collapsible">
                Alterar contato
            </button>
            <div class="content">
                <a>Contatos existentes</a>
                <a>Criar novo contato</a>""
            </div>
            
            <button class="collapsible">
                Blog
            </button>
            <div class="content">
                <a>Postagens existentes</a>
                <a>Criar nova postagem</a>
            </div>

        </div>

        <div class="logout-container">
            <button id="logout">Voltar ao site</button>
        </div>

        <div class="usuLogado">
            <img src="imgs/icons/usuLogadoIcon.png" id="usuLogadoIcon">
            <p id="usuLogadoTxt">Usuário logado: </p>
        </div>
    </aside>
        
    <main>

        <div class="container">
            <h1 id="listaUsuTit">Lista de Usuários</h1>

            <div class="containerLista">
                <div class="listaLinha">
                    <span id="col1">
                        <p class="nome" id="nome1">Nome: </p>
                        <p class="ultimoAcesso" id="ultimoAcesso1">Último acesso: </p>
                        <div class="crudBtns">
                            <button class="crudBtn" id="editar">Editar Usuário</button>
                            <button class="crudBtn" id="apagar">Apagar Usuário</button>
                        </div>
                    </span>
                    <span id="col2">
                        <p class="tipoUsu" id="tipoUsu1">Administrador</p>
                    </span>
                </div>
                <div class="listaLinha">
                    <span id="col1">
                        <p class="nome" id="nome2">Nome: </p>
                        <p class="ultimoAcesso" id="ultimoAcesso2">Último acesso: </p>
                        <div class="crudBtns">
                            <button class="crudBtn" id="editar">Editar Usuário</button>
                            <button class="crudBtn" id="apagar">Apagar Usuário</button>
                        </div>
                    </span>
                    <span id="col2">
                        <p class="tipoUsu" id="tipoUsu2">Usuário</p>
                    </span>
                </div>
            </div>
        </div>

    </main>

    <script src="js/sidebar.js"></script>
